name: "Seguridad CodeQL"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '30 0 * * 1' # Se ejecuta cada lunes a las 00:30 para un chequeo extra

jobs:
  analyze:
    name: Analizar Seguridad
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        # CodeQL soporta estos lenguajes en tu proyecto
        language: [ 'python', 'javascript-typescript' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # Inicializa las herramientas de CodeQL para el escaneo
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}
        # Puedes añadir consultas personalizadas aquí si el proyecto crece
        queries: security-extended,security-and-quality

    # Como Python y JS no necesitan compilación pesada, usamos autobuild
    - name: Autobuild
      uses: github/codeql-action/autobuild@v3

    # Aquí es donde ocurre la magia del escaneo profundo
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:${{ matrix.language }}"
